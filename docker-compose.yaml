version: '3.8'

services:
  db-market:
    container_name: db-market
    image: postgres:17.5
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - ./migration/:/docker-entrypoint-initdb.d/
    networks:
      - market-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


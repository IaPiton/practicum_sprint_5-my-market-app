server:
  port: 8080

spring:
  webflux:
    session:
      timeout: 30m
  r2dbc:
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url: r2dbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            authorizationGrantType: client_credentials
            client-id: ${OAUTH2_CLIENT:market-client-api}
            client-secret: ${OAUTH2_SECRET:wz7Y0i5otfbsXtSzke3cVu8aKrCROrKg}
            scope: profile
            clientAuthenticationMethod: client_secret_post
        provider:
          keycloak:
            issuer-uri: ${OAUTH2_HOST:http://localhost:8082}${OAUTH2_SERVER_URL:/realms/master}
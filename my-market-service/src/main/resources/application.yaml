            client-secret: wz7Y0i5otfbsXtSzke3cVu8aKrCROrKg
            scope: profile
            clientAuthenticationMethod: client_secret_post
        provider:
          keycloak:
            issuer-uri: ${OAUTH2_SERVER:http://localhost:8082/realms/master}